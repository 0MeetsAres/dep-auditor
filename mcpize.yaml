# MCPize Configuration
# Docs: https://mcpize.com/docs/mcpize-yaml

version: 1

name: "Dependency Auditor"
slug: "dep-auditor"

runtime: python
entry: "dep-auditor/main.py"

build:
  install: "pip install httpx mcp"

start:
  type: stdio
  command: "python"
  args:
    - "dep-auditor/main.py"

bridge:
  mode: stdio
